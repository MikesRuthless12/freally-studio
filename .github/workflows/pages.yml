name: pages

# Deploy docs/ (the Releases & Updates site) to GitHub Pages via Actions.
# We use a workflow (not "deploy from branch") so checkout can run with
# submodules: false — the legacy branch builder does a recursive submodule
# checkout that fails on the native/third_party/vst3sdk gitlink (no .gitmodules).
on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy docs/ to GitHub Pages
    runs-on: ubuntu-22.04
    # deploy-pages polls the Pages API until the deployment goes live; that
    # backend step occasionally runs past 5m and tripped the timeout (run
    # 28533090834). 10m gives margin — the actual upload is ~20s.
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
