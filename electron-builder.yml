appId: com.havocsoftware.freally
productName: Freally Studio
copyright: Copyright (c) Havoc Software

# User-facing filenames say 0.20.02; internal package.json version is 0.20.2
# (electron-builder requires valid semver — no leading zero).
artifactName: Freally-Studio-0.20.02-${arch}.${ext}

protocols:
  - name: Freally Collab
    schemes:
      - freally

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: "native/build/Release"
    to: "native"
    filter:
      - "*.node"
  - from: "public/mobile-app"
    to: "mobile-app"
    filter:
      - "**/*"
  - from: "public/worklets"
    to: "worklets"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: src/images/freally_app_icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: src/images/freally_app_icon.png
  category: public.app-category.music

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: src/images/freally_app_icon.png
  category: AudioVideo
  mimeTypes:
    - x-scheme-handler/freally
  desktop:
    MimeType: x-scheme-handler/freally

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
