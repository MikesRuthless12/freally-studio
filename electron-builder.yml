appId: com.havocsoftware.wavloom
productName: WavLoom Studio
copyright: Copyright (c) Havoc Software

protocols:
  - name: WavLoom Collab
    schemes:
      - wavloom

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: "native/build/Release"
    to: "native"
    filter:
      - "*.node"
  - from: "Factory Library"
    to: "Factory Library"
    filter:
      - "**/*"
  - from: "public/mobile-app"
    to: "mobile-app"
    filter:
      - "**/*"
  - from: "public/wasm"
    to: "wasm"
    filter:
      - "**/*"
  - from: "public/worklets"
    to: "worklets"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: src/images/wavloom_app_icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: src/images/wavloom_app_icon.png
  category: public.app-category.music

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: src/images/wavloom_app_icon.png
  category: AudioVideo
  mimeTypes:
    - x-scheme-handler/wavloom
  desktop:
    MimeType: x-scheme-handler/wavloom

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
